# .github/workflows/build.yml
---
name: Build and Push Container Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from version.py
        id: version
        run: |
          VERSION=$(python -c "import version; print(version.VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          BRANCH="${{ github.ref_name }}"
          # Sanitize branch name: replace any character that is not alphanumeric,
          # hyphen, or period with a hyphen, then strip leading/trailing hyphens.
          SAFE_BRANCH=$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//')
          # GHCR requires lowercase repository names
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          if [ "${BRANCH}" = "main" ]; then
            TAGS="${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:latest"
          else
            TAGS="${IMAGE}:${SAFE_BRANCH}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

# EOF .github/workflows/build.yml
