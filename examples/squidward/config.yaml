job: extension
config:
  name: squidward_depth_diff_split
  process:
  - type: diffusion_trainer
    training_folder: output
    sqlite_db_path: aitk_db.db
    device: cuda
    trigger_word: null
    performance_log_every: 10
    network:
      type: lokr
      linear: 32
      linear_alpha: 32
      conv: 16
      conv_alpha: 16
      lokr_full_rank: true
      lokr_factor: 8
      network_kwargs:
        ignore_if_contains: []
    save:
      dtype: bf16
      save_every: 50
      max_step_saves_to_keep: 120
      save_format: diffusers
      push_to_hub: false
    datasets:
    - folder_path: examples/squidward/dataset
      mask_path: null
      mask_min_value: 0.1
      default_caption: ''
      caption_ext: txt
      caption_dropout_rate: 0.05
      cache_latents_to_disk: true
      is_reg: false
      network_weight: 1
      resolution:
      - 512
      controls: []
      shrink_video_to_frames: true
      num_frames: 1
      flip_x: false
      flip_y: false
      num_repeats: 50
      depth_loss_weight: 0.005
      diffusion_loss_weight: 1
      identity_loss_weight: 0
      loss_split: diffusion_depth
    train:
      batch_size: 1
      bypass_guidance_embedding: false
      steps: 1200
      gradient_accumulation: 2
      train_unet: true
      train_text_encoder: false
      gradient_checkpointing: true
      noise_scheduler: flowmatch
      optimizer: adamw8bit
      timestep_type: weighted
      content_or_style: balanced
      optimizer_params:
        weight_decay: 0.0001
      unload_text_encoder: false
      cache_text_embeddings: true
      lr: 5.0e-05
      ema_config:
        use_ema: false
        ema_decay: 0.99
      skip_first_sample: false
      force_first_sample: false
      disable_sampling: true
      dtype: bf16
      diff_output_preservation: false
      diff_output_preservation_multiplier: 1
      diff_output_preservation_class: person
      switch_boundary_every: 1
      loss_type: mse
      diffusion_loss_weight: 1
      diffusion_loss_max_t: 1
      diffusion_loss_min_t: 0
    logging:
      log_every: 1
      use_ui_logger: true
    model:
      name_or_path: <path to your flux model>
      quantize: true
      qtype: qfloat8
      quantize_te: true
      qtype_te: qfloat8
      arch: flux2_klein_9b
      low_vram: false
      model_kwargs:
        match_target_res: false
      layer_offloading: false
      layer_offloading_text_encoder_percent: 1
      layer_offloading_transformer_percent: 1
    sample:
      sampler: flowmatch
      sample_every: 100
      width: 768
      height: 1284
      samples:
      - prompt: woman's body
      neg: ''
      seed: 42
      walk_seed: false
      guidance_scale: 4
      sample_steps: 25
      num_frames: 1
      fps: 1
    face_id:
      enabled: false
      init_scale: 0.3
      identity_loss_weight: 0
      landmark_loss_weight: 0
      body_proportion_loss_weight: 0
      body_proportion_loss_min_t: 0.8
      body_proportion_loss_max_t: 1
      body_shape_loss_weight: 0
      body_shape_loss_max_t: 1
      body_shape_loss_min_t: 0.8
      identity_loss_min_t: 0
      identity_loss_max_t: 0.9
      identity_metrics: true
      identity_loss_use_average: true
      identity_loss_min_cos: 0.4
    depth_consistency:
      loss_weight: 0.005
      input_size: 1400
      preview_every: 1
      mask_source: none
      loss_max_t: 0.9
      model_id: depth-anything/Depth-Anything-V2-Large-hf
      loss_min_t: 0
    subject_mask:
      enabled: false
      background_loss_weight: 0
      clothing_loss_weight: 0
      save_debug_previews: true
      cache_resolution: 768
      segformer_res: 768
meta:
  name: squidward_depth_diff_split
  version: '1.0'
